name = "stratabracket-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "stratabracket-db"
database_id = "771cecde-da04-4829-8c00-f3a1624bbc39"

[triggers]
crons = ["0 0 * * *"]

[vars]
ENVIRONMENT = "development"

[env.production]
routes = [
  { pattern = "sb.smyth.dev/api/*", zone_name = "smyth.dev" }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "stratabracket-db"
database_id = "771cecde-da04-4829-8c00-f3a1624bbc39"

[env.production.vars]
ENVIRONMENT = "production"
APP_ORIGIN = "https://sb.smyth.dev"
ANTHROPIC_MODEL = "claude-sonnet-4-6"
